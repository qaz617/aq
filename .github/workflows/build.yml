name: Build sing-box

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  GO_VERSION: '1.26.4'

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      stable_version: ${{ steps.get_stable.outputs.version }}
      latest_version: ${{ steps.get_latest.outputs.version }}
      latest_prerelease: ${{ steps.get_latest.outputs.is_prerelease }}
    steps:
      - name: Get stable version
        id: get_stable
        run: |
          VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r '.tag_name')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Stable version: $VERSION"

      - name: Get latest version
        id: get_latest
        run: |
          LATEST=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases | jq -r '.[0]')
          VERSION=$(echo "$LATEST" | jq -r '.tag_name')
          IS_PRERELEASE=$(echo "$LATEST" | jq -r '.prerelease')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "Latest version: $VERSION (prerelease: $IS_PRERELEASE)"

  compile-stable:
    needs: get-version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: sing-box-linux-amd64
          - goos: android
            goarch: arm64
            output: sing-box-android-arm64
          - goos: darwin
            goarch: arm64
            output: sing-box-darwin-arm64

    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Checkout sing-box
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          ref: ${{ needs.get-version.outputs.stable_version }}
          path: sing-box

      - name: Build
        working-directory: sing-box
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -trimpath \
            -ldflags "-s -w -X 'github.com/sagernet/sing-box/constant.Version=${{ needs.get-version.outputs.stable_version }}'" \
            -tags "with_quic,with_utls,with_clash_api,with_gvisor,with_cloudflared" \
            -o sing-box \
            ./cmd/sing-box

      - name: Package
        working-directory: sing-box
        run: zip ${{ matrix.output }}.zip sing-box

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stable-${{ matrix.output }}
          path: sing-box/${{ matrix.output }}.zip

  compile-latest:
    needs: get-version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: sing-box-linux-amd64
          - goos: android
            goarch: arm64
            output: sing-box-android-arm64
          - goos: darwin
            goarch: arm64
            output: sing-box-darwin-arm64

    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Checkout sing-box
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          ref: ${{ needs.get-version.outputs.latest_version }}
          path: sing-box

      - name: Build
        working-directory: sing-box
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -trimpath \
            -ldflags "-s -w -X 'github.com/sagernet/sing-box/constant.Version=${{ needs.get-version.outputs.latest_version }}'" \
            -tags "with_quic,with_utls,with_clash_api,with_gvisor,with_cloudflared" \
            -o sing-box \
            ./cmd/sing-box

      - name: Package
        working-directory: sing-box
        run: zip ${{ matrix.output }}.zip sing-box

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: latest-${{ matrix.output }}
          path: sing-box/${{ matrix.output }}.zip

  release-stable:
    needs: [get-version, compile-stable]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: stable-*
          merge-multiple: true
          path: stable

      - name: Create stable release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.get-version.outputs.stable_version }}
          name: sing-box ${{ needs.get-version.outputs.stable_version }}
          files: stable/*.zip
          generate_release_notes: true

  release-latest:
    needs: [get-version, compile-latest]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: latest-*
          merge-multiple: true
          path: latest

      - name: Create latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.get-version.outputs.latest_version }}
          name: sing-box ${{ needs.get-version.outputs.latest_version }}
          prerelease: ${{ needs.get-version.outputs.latest_prerelease == 'true' }}
          files: latest/*.zip
          generate_release_notes: true
